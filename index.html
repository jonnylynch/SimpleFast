<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimpleFast – DIY Fasting Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f59e0b" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center py-5 px-4 gap-4">

  <!-- Header -->
  <h1 class="text-2xl font-bold tracking-widest text-gray-400 uppercase">SimpleFast</h1>

  <!-- Timer Ring -->
  <div class="relative flex items-center justify-center">
    <svg viewBox="0 0 220 220" width="200" height="200">
      <circle class="ring-bg" cx="110" cy="110" r="96" />
      <circle id="progressRing" class="ring-fill" cx="110" cy="110" r="96" />
    </svg>
    <div class="absolute text-center">
      <div id="timerDisplay" class="text-5xl font-mono font-bold tracking-tight">00:00:00</div>
      <div id="goalLabel" class="text-sm text-gray-500 mt-1">No active fast</div>
    </div>
  </div>

  <!-- Status Carousel -->
  <div class="w-full max-w-sm flex flex-col gap-2">
    <div id="statusCarousel" class="status-carousel">
      <!-- cards injected by JS -->
    </div>
    <div id="carouselDots" class="flex justify-center gap-2 mt-1">
      <!-- dots injected by JS -->
    </div>
  </div>

  <!-- PWA install banner (shown only when browser fires beforeinstallprompt) -->
  <div id="installBanner" class="install-banner hidden">
    <span class="install-banner-text">Add SimpleFast to your home screen for quick access.</span>
    <button class="install-banner-btn" onclick="triggerInstall()">Install</button>
    <button class="install-banner-dismiss" onclick="dismissInstall()" aria-label="Dismiss">✕</button>
  </div>

  <!-- Controls -->
  <div class="w-full max-w-sm flex flex-col gap-3">
    <div class="grid grid-cols-4 gap-2" id="goalButtons">
      <button onclick="selectGoal(12)" class="goal-btn" data-hours="12">12:12</button>
      <button onclick="selectGoal(14)" class="goal-btn" data-hours="14">14:10</button>
      <button onclick="selectGoal(16)" class="goal-btn" data-hours="16">16:8</button>
      <button onclick="selectGoal(24)" class="goal-btn" data-hours="24">24h</button>
    </div>

    <!-- Collapsible offset panel -->
    <div id="offsetRow" class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
      <button onclick="toggleOffsetPanel()" class="w-full relative flex items-center justify-center px-4 py-3 text-sm font-semibold text-amber-400 hover:bg-gray-800 transition-colors">
        <span>I already started!</span>
        <span id="offsetChevron" class="absolute right-4 text-gray-500 transition-transform duration-200">▼</span>
      </button>
      <div id="offsetPanel" class="hidden px-4 pb-4 pt-1 flex flex-col gap-2">
        <div class="flex justify-between items-center">
          <span class="text-xs text-gray-500">0 hr</span>
          <span id="offsetLabel" class="text-sm font-semibold text-amber-400">0 min ago</span>
          <span class="text-xs text-gray-500">24 hrs</span>
        </div>
        <input id="offsetInput" type="range" min="0" max="1440" step="1" value="0"
          oninput="updateOffsetLabel(this.value)" class="offset-slider w-full" />
      </div>
    </div>

    <button id="actionBtn" onclick="handleActionBtn()" class="action-btn" disabled>
      Select a Goal
    </button>
  </div>

  <!-- End Fast Confirmation Modal -->
  <div id="confirmModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="text-5xl mb-3">⏹️</div>
      <h2 class="text-2xl font-bold mb-2">End your fast?</h2>
      <p class="text-sm text-gray-400 mb-8 leading-relaxed">Your progress will be cleared and the timer will reset.</p>
      <button onclick="confirmEndFast()" class="modal-btn-end">Yes, end it</button>
      <button onclick="closeModal()" class="modal-btn-cancel">Keep going</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
